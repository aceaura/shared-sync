# 方案 A:前置 nginx 把 shared-sync 服务端挂到子路径(推荐,容器零改动)。
#
# 适用场景:同一域名下用路径分流多个服务,例如 /sync/ 给本同步服务。
# 容器仍在根路径提供 *.git(默认 8418 端口),前缀由本入口 nginx 剥掉。
#
# 客户端地址(注意带子路径):
#   https://example.com/sync/shared.git
#
# 铁律:git-http-backend 用 GIT_PROJECT_ROOT + PATH_INFO 定位仓库,
#       转发给容器的路径里绝不能带 /sync/ 前缀,否则会去找 /srv/git/sync/shared.git 而 404。
#       下方 proxy_pass 末尾的 "/" 就是用来剥掉 /sync/ 前缀的,务必保留。

server {
    listen 443 ssl;
    server_name example.com;

    ssl_certificate     /etc/ssl/example.crt;
    ssl_certificate_key /etc/ssl/example.key;

    # 其它服务可在此继续按路径分流:
    # location /app/  { proxy_pass http://127.0.0.1:3000/; }
    # location /api/  { proxy_pass http://127.0.0.1:8080/; }

    location /sync/ {
        # 末尾 "/" 剥掉 /sync/ 前缀:/sync/shared.git/... → /shared.git/...
        proxy_pass http://127.0.0.1:8418/;

        # git push 的 pack 可能很大,必须放开(默认 1MB 会断 push)
        client_max_body_size 0;

        # HTTP/1.1 + 关闭缓冲,支持 git 的流式/分块传输
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;

        # 透传认证(若容器启用了 GIT_AUTH_USER/PASSWORD)与常规头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;

        # 大仓库 clone/push 给足超时
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
