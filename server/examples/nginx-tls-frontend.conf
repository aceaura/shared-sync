# 前置 nginx 反向代理 + HTTPS 终止(根路径,不分子路径)。
#
# 适用场景:给 shared-sync 服务端套一层 TLS / 域名,客户端用 https 访问。
# 客户端地址:
#   https://sync.example.com/shared.git
#
# 与子路径部署的区别:这里在根路径代理,proxy_pass 不带尾部路径,
# 容器收到的路径与客户端一致(/shared.git/...),无需剥前缀。

server {
    listen 80;
    server_name sync.example.com;
    # 强制跳转 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sync.example.com;

    ssl_certificate     /etc/ssl/sync.crt;
    ssl_certificate_key /etc/ssl/sync.key;

    # git push 的 pack 可能很大,必须放开(默认 1MB 会断 push)
    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:8418;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
