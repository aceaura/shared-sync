name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: 引擎 analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
      - name: dart pub get / analyze / test
        working-directory: client/engine
        run: |
          dart pub get
          dart analyze
          dart test

  app:
    name: 应用 analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
      - name: flutter pub get / analyze / test
        working-directory: client/app
        run: |
          flutter pub get
          flutter analyze
          flutter test

  connd:
    name: connd build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: go build / vet / test -race
        working-directory: v2/connd
        run: |
          go build ./...
          go vet ./...
          go test ./... -race
