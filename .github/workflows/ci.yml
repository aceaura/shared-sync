name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: 引擎 analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
      - name: dart pub get / analyze / test
        working-directory: client/engine
        run: |
          dart pub get
          dart analyze
          dart test

  app:
    name: 应用 analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
      - name: flutter pub get / analyze / test
        working-directory: client/app
        run: |
          flutter pub get
          flutter analyze
          flutter test
