name: Release

# 由 `scripts/release.sh` 推送的 v* tag 触发;也支持手动触发(仅重建桌面安装器)。
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '版本 tag(例如 v1.0.0)'
        required: true

permissions:
  contents: write   # 创建 Release、上传产物
  packages: write   # 推送镜像到 ghcr

env:
  FLUTTER_VERSION: 3.44.2

jobs:
  # ---------- macOS 安装器(.dmg) ----------
  macos:
    name: macOS 安装器
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: 构建 .app 并打包 .dmg
        working-directory: client/app
        run: |
          flutter pub get
          flutter build macos --release
      - name: 打包 .dmg
        run: bash installer/macos/make-dmg.sh
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: client/app/build/macos/*.dmg
          fail_on_unmatched_files: true

  # ---------- Windows 安装器(.exe) ----------
  windows:
    name: Windows 安装器
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: 构建 Windows 桌面应用
        working-directory: client/app
        run: |
          flutter pub get
          flutter build windows --release
      - name: 计算版本号(去掉前缀 v)
        id: ver
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: 用 Inno Setup 打包
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            "installer\windows\installer.iss"
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: installer/windows/Output/*.exe
          fail_on_unmatched_files: true

  # ---------- 服务端镜像(ghcr) ----------
  server-image:
    name: 服务端镜像 -> ghcr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 计算版本号
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: |
            ghcr.io/aceaura/shared-sync-server:${{ steps.ver.outputs.version }}
            ghcr.io/aceaura/shared-sync-server:latest
